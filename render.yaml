services:
  - type: web
    name: ballot-finder
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 300 --keep-alive 300
    envVars:
      - key: ADMIN_PASSWORD
        generateValue: false
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
